<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- wall line -->
  <line x1="8" y1="14" x2="56" y2="14" stroke-width="2" opacity="0.3"/>
  <!-- wall mounting bracket -->
  <rect x="24" y="8" width="16" height="8" rx="1" fill="currentColor" opacity="0.15"/>
  <!-- TV screen -->
  <rect x="12" y="16" width="40" height="28" rx="3" />
  <!-- TV inner screen -->
  <rect x="16" y="20" width="32" height="20" rx="1" fill="currentColor" opacity="0.08"/>
  <!-- stand/legs -->
  <line x1="22" y1="44" x2="20" y2="52" />
  <line x1="42" y1="44" x2="44" y2="52" />
  <line x1="18" y1="52" x2="46" y2="52" />
  <!-- drill hole marks on wall -->
  <circle cx="28" cy="12" r="1" fill="currentColor"/>
  <circle cx="36" cy="12" r="1" fill="currentColor"/>
</svg>